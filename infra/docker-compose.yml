services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: dairy_ai_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dairy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dairy123}
      POSTGRES_DB: ${POSTGRES_DB:-dairy_ai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dairy -d dairy_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dairy_ai_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: dairy_ai_mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: dairy_ai_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_started
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://dairy:dairy123@postgres:5432/dairy_ai
      REDIS_URL: redis://redis:6379/0
      MQTT_BROKER_HOST: mosquitto

volumes:
  postgres_data:
  mosquitto_data:
